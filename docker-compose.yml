version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: itil_capacity_postgres
    environment:
      POSTGRES_DB: itil_capacity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: itil_capacity_api
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
